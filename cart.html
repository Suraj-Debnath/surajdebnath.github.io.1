<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Roni.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="navbar-1">
            <a class="brand-logo" href="index.html">Roni.in</a>
            <div class="search-container" style="visibility: hidden;">
                <input type="text" class="search" placeholder="Search">
                <button class="search-btn">🔍</button>
            </div>
            <div class="nav-right">
                <a href="cart.html" class="nav-link mobile-cart-link">🛒<span class="cartCount">0</span></a>
                <a href="index.html" class="nav-link">Home</a>
                <a href="cart.html" class="nav-link main-cart-link">Cart 🛒: <span class="cartCount" style="color: #f3a847;">0</span></a>
            </div>
        </div>
    </header>

    <main class="main" style="padding: 20px;">
        <div class="content-wrapper" style="margin-top: 20px; display: flex; flex-direction: column; gap: 20px;">
            <div class="box" style="width: 100%;">
                <h2>Shopping Cart</h2>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                <div id="cartItemsContainer"></div>
                <div id="emptyCartMessage" style="display: none; text-align: center; padding: 40px 0;">
                    <h3>Your Roni.in Cart is empty.</h3>
                    <a href="index.html" style="color: #0066c0; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px;">Go shopping now</a>
                </div>
            </div>

            <div class="box" id="subtotalBox" style="width: 100%; max-width: 400px; align-self: flex-end; display: flex; flex-direction: column; gap: 10px;">
                <h3>Subtotal (<span id="totalItemsText">0</span> items): <span style="color: #B12704; font-size: 20px;" id="totalPriceText">₹0</span></h3>
                
                <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                    <label for="deliveryAddress" style="font-size: 14px; font-weight: bold; color: #333;">Delivery Address:</label>
                    <textarea id="deliveryAddress" placeholder="Enter your name,phone number(village,pin number,city)Must important" style="width: 100%; height: 70px; padding: 10px; border: 1px solid #bbb; border-radius: 4px; resize: none; font-family: sans-serif; font-size: 13px;"></textarea>
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px;">
                    <label style="font-size: 14px; font-weight: bold; color: #333;">Select Payment Method:</label>
                    
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                        <input type="radio" name="paymentMethod" value="COD" checked> Cash on Delivery (COD)
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                        <input type="radio" name="paymentMethod" value="ONLINE"> Pay Online (PhonePe / GPay / Paytm)
                    </label>
                </div>

                <div id="onlinePayBox" style="display: none; background: #fff9f3; padding: 12px; border: 1px dashed #f3a847; border-radius: 4px; margin-top: 5px; text-align: center;">
                    
                    <div id="desktopPayment" style="display: none;">
                        <p style="font-size: 13px; margin: 0 0 8px 0; color: #333; font-weight: bold;">📱 Scan QR Code to Pay:</p>
                        <img id="upiQrImg" src="" alt="UPI QR Code" style="width: 150px; height: 150px; background: #fff; padding: 5px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px;">
                        <p style="font-size: 12px; margin: 0 0 10px 0; color: #666;">UPI ID: <span id="displayUpiId" style="font-weight: bold; color: #0066c0;"></span></p>
                    </div>

                    <div id="mobilePayment" style="display: none;">
                        <p style="font-size: 13px; margin: 0 0 10px 0; color: #333; font-weight: bold;">
                            🔒 Clicking "Proceed to Buy" will open your UPI apps.
                        </p>
                    </div>

                    <div id="confirmPaymentArea" style="display: none; border-top: 1px dashed #ddd; padding-top: 10px; margin-top: 10px; text-align: left;">
                        <label for="transactionId" style="font-size: 12px; font-weight: bold; color: #333; display: block; margin-bottom: 5px;">টাকা পাঠানোর পর ১২ ডিজিটের UTR / Txn ID টি এখানে লিখুন:</label>
                        <input type="text" id="transactionId" placeholder="Example: 4123XXXXXXXX" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 5px; box-sizing: border-box;">
                        
                        <div id="paymentAlertMsg" style="font-size: 12px; font-weight: bold; margin-bottom: 8px; display: none; padding: 8px; border-radius: 4px;"></div>

                        <button id="iHavePaidBtn" style="width: 100%; background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; text-align: center;">I Have Paid (অর্ডার কনফার্ম করুন) ✅</button>
                    </div>
                </div>

                <div id="mainAlertMsg" style="font-size: 13px; font-weight: bold; margin-top: 5px; display: none; padding: 10px; border-radius: 4px; text-align: center;"></div>

                <button id="checkoutBtn" class="buy-now-btn" style="width: 100%; margin-top: 5px; border-radius: 4px; padding: 12px;">Proceed to Buy</button>
            </div>
        </div>
    </main>

    <script src="cart.js"></script>
</body>
</html>
