<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Roni.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="navbar-1">
            <a class="brand-logo" href="index.html">Roni.in</a>
            <div class="search-container" style="visibility: hidden;">
                <input type="text" class="search" placeholder="Search">
                <button class="search-btn">🔍</button>
            </div>
            <div class="nav-right">
                <a href="cart.html" class="nav-link mobile-cart-link">🛒<span class="cartCount">0</span></a>
                <a href="index.html" class="nav-link">Home</a>
                <a href="cart.html" class="nav-link main-cart-link">Cart 🛒: <span class="cartCount" style="color: #f3a847;">0</span></a>
            </div>
        </div>
    </header>

    <main class="main" style="padding: 20px;">
        <div class="content-wrapper" style="margin-top: 20px; display: flex; flex-direction: column; gap: 20px;">
            <div class="box" style="width: 100%;">
                <h2>Shopping Cart</h2>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                <div id="cartItemsContainer"></div>
                <div id="emptyCartMessage" style="display: none; text-align: center; padding: 40px 0;">
                    <h3>Your Roni.in Cart is empty.</h3>
                    <a href="index.html" style="color: #0066c0; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px;">Go shopping now</a>
                </div>
            </div>

            <div class="box" id="subtotalBox" style="width: 100%; max-width: 400px; align-self: flex-end; display: flex; flex-direction: column; gap: 10px;">
                <h3>Subtotal (<span id="totalItemsText">0</span> items): <span style="color: #B12704; font-size: 20px;" id="totalPriceText">₹0</span></h3>
                
                <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                    <label for="deliveryAddress" style="font-size: 14px; font-weight: bold; color: #333;">Delivery Address:</label>
                    <textarea id="deliveryAddress" placeholder="Enter your name , phone number and full address(Must important)" style="width: 100%; height: 70px; padding: 10px; border: 1px solid #bbb; border-radius: 4px; resize: none; font-family: sans-serif; font-size: 13px;"></textarea>
                </div>

                <button id="checkoutBtn" class="buy-now-btn" style="width: 100%; margin-top: 10px; border-radius: 4px; padding: 12px;">Order Now</button>
            </div>
        </div>
    </main>

    <script src="cart.js"></script>
</body>
</html>
